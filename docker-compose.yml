services:
    app:
        build: .
        ports:
            - "${PORT}:${PORT}"
        depends_on:
            - postgres
        environment:
            - PORT=${PORT}
            - DATABASE_URL=${DATABASE_URL}

    postgres:
        image: postgres:18-alpine
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=postgres
            - POSTGRES_DB=url_shortener
        volumes:
            - postgres_data:/var/lib/postgresql

volumes:
    postgres_data:
